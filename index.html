<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portafolio Académico Ronaldo</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
color:#fff;
overflow-x:hidden;
animation:bgMove 15s infinite alternate;
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1c1c1c);
background-size:400% 400%;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

header{
text-align:center;
padding:40px 20px;
background:rgba(0,0,0,0.6);
}

h1{font-size:40px;margin:0;}
.frase{font-size:18px;margin-top:10px;opacity:0.8;}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:30px;
max-width:1100px;
margin:auto;
}

.folder{
padding:30px;
border-radius:15px;
cursor:pointer;
transition:0.3s;
text-align:center;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.5);
}
.folder:hover{transform:scale(1.05);}

.s1{background:linear-gradient(45deg,#ff9a9e,#fad0c4);} 
.s2{background:linear-gradient(45deg,#a18cd1,#fbc2eb);} 
.s3{background:linear-gradient(45deg,#f6d365,#fda085);} 
.s4{background:linear-gradient(45deg,#84fab0,#8fd3f4);} 
.s5{background:linear-gradient(45deg,#fccb90,#d57eeb);} 
.s6{background:linear-gradient(45deg,#e0c3fc,#8ec5fc);} 
.s7{background:linear-gradient(45deg,#f093fb,#f5576c);} 
.s8{background:linear-gradient(45deg,#43e97b,#38f9d7);} 
.s9{background:linear-gradient(45deg,#fa709a,#fee140);} 
.s10{background:linear-gradient(45deg,#30cfd0,#330867);} 

.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
flex-direction:column;
}

.modal-content{
background:#111;
padding:20px;
border-radius:10px;
text-align:center;
max-width:500px;
}

.preview p{
background:#222;
padding:8px;
border-radius:5px;
margin:5px 0;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
margin:5px;
padding:8px 12px;
border:none;
background:linear-gradient(45deg,#ff7e5f,#feb47b);
color:#fff;
border-radius:5px;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>Mi Portafolio Académico Ronaldo</h1>
<p class="frase">"La Verdadera Fuerza Radica en la Humildad"</p>
</header>

<div class="container">
<div class="folder s1" onclick="openFolder(1)">Semestre I</div>
<div class="folder s2" onclick="openFolder(2)">Semestre II</div>
<div class="folder s3" onclick="openFolder(3)">Semestre III</div>
<div class="folder s4" onclick="openFolder(4)">Semestre IV</div>
<div class="folder s5"
